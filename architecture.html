

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Voice Agent — Architecture Diagrams</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem;
        }
        header {
            text-align: center;
            margin-bottom: 3rem;
        }
        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6c63ff, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        header p {
            color: #888;
            font-size: 1rem;
        }
        .download-all-bar {
            display: flex;
            justify-content: center;
            margin-bottom: 2.5rem;
        }
        .download-all-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 2rem;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #6c63ff, #e94560);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(108, 99, 255, 0.3);
        }
        .download-all-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(108, 99, 255, 0.45);
        }
        .diagram-card {
            background: #12122a;
            border: 1px solid #1e1e3a;
            border-radius: 16px;
            margin-bottom: 2.5rem;
            overflow: hidden;
            transition: border-color 0.3s;
        }
        .diagram-card:hover {
            border-color: #6c63ff55;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid #1e1e3a;
        }
        .card-header h2 {
            font-size: 1.15rem;
            font-weight: 600;
            color: #f0f0f0;
        }
        .card-header .badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            background: #1e1e3a;
            color: #888;
        }
        .card-body {
            padding: 2rem;
            display: flex;
            justify-content: center;
            overflow-x: auto;
            background: #fff;
            min-height: 200px;
        }
        .card-body .mermaid {
            width: 100%;
        }
        .card-body svg {
            max-width: 100%;
            height: auto;
        }
        .card-footer {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            padding: 1rem 1.5rem;
            border-top: 1px solid #1e1e3a;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.55rem 1.25rem;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            color: #ccc;
            background: #1a1a32;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #252548;
            border-color: #6c63ff;
            color: #fff;
        }
        .btn.primary {
            background: linear-gradient(135deg, #6c63ff, #5a52d5);
            border-color: transparent;
            color: #fff;
        }
        .btn.primary:hover {
            background: linear-gradient(135deg, #7b73ff, #6c63ff);
            box-shadow: 0 2px 12px rgba(108, 99, 255, 0.3);
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #6c63ff44;
            border-top-color: #6c63ff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 0.85rem 1.5rem;
            background: #1e1e3a;
            border: 1px solid #6c63ff;
            border-radius: 12px;
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
<header>
    <h1>Live Voice Agent — Architecture Diagrams</h1>
    <p>Click the download buttons below to save each diagram as a high-resolution PNG.</p>
</header>
<div class="download-all-bar">
    <button class="download-all-btn" onclick="downloadAll()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download All (PNG)
    </button>
</div>
<div id="diagrams-container"></div>
<div id="toast" class="toast"></div>
<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
        startOnLoad: false,
        theme: 'default',
        themeVariables: {
            fontSize: '14px'
        },
        flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' },
        sequence: { useMaxWidth: true, wrap: true, width: 180 },
        stateDiagram: { useMaxWidth: true }
    });
    const diagrams = [
        {
            id: 'high-level-system',
            title: '1. High-Level System Architecture',
            badge: 'Overview',
            code: `graph TB
    subgraph Browser["Browser Client"]
        UI["index.html\\nUI Layer"]
        Agent["agent.js\\nVoiceAgent"]
        Worklet["audio-processor.js\\nAudioWorklet"]
    end
    subgraph Server["FastAPI Backend"]
        FastAPI["main.py\\nFastAPI App"]
        Pipeline["pipeline.py\\nPipecat Pipeline"]
        subgraph Processors["Custom Processors"]
            Pivot["pivot_detector.py\\nPivotDetectorProcessor"]
            Nat["naturalizer.py\\nResponseNaturalizerProcessor"]
        end
        Serializer["raw_pcm.py\\nRawPCMSerializer"]
    end
    subgraph Cloud["Cloud AI Services"]
        STT["Sarvam STT"]
        LLM["Cerebras LLM"]
        TTS["Sarvam TTS"]
    end
    subgraph Runtime["Runtime Environment"]
        UV["uv\\nPackage Manager"]
        PyProj["pyproject.toml\\nDependencies"]
        Env[".env\\nAPI Keys & Config"]
    end
    UI <-->|"User interaction"| Agent
    Agent <-->|"Float32 mic frames"| Worklet
    Agent <-->|"WebSocket\\nws://localhost:8805/ws"| FastAPI
    FastAPI --> Pipeline
    Pipeline --> Serializer
    Pipeline --> Pivot
    Pipeline --> Nat
    Pipeline -->|"API calls"| STT
    Pipeline -->|"API calls"| LLM
    Pipeline -->|"API calls"| TTS
    Runtime -.->|"manages"| Server
    style Browser fill:#1a1a2e,stroke:#e94560,color:#fff
    style Server fill:#16213e,stroke:#0f3460,color:#fff
    style Cloud fill:#0f3460,stroke:#533483,color:#fff
    style Runtime fill:#1a1a2e,stroke:#533483,color:#fff`
        },
        {
            id: 'end-to-end-flow',
            title: '2. End-to-End Data Flow',
            badge: 'Sequence',
            code: `sequenceDiagram
    autonumber
    participant Mic as Microphone
    participant Worklet as AudioWorklet
    participant Agent as agent.js
    participant WS as WebSocket
    participant Transport as FastAPIWebsocketTransport
    participant Serializer as RawPCMSerializer
    participant STT as Sarvam STT
    participant Turn as Turn Analyzer
    participant Pivot as PivotDetector
    participant LLM as Cerebras LLM
    participant Naturalizer as ResponseNaturalizer
    participant TTS as Sarvam TTS
    participant Speaker as Speaker
    Mic->>Worklet: Raw Float32 PCM frames
    Worklet->>Agent: Float32 audio buffers
    Agent->>Agent: Float32 to PCM16 conversion
    Agent->>WS: Binary PCM16 bytes
    WS->>Transport: Raw bytes received
    Transport->>Serializer: Deserialize
    Serializer->>STT: InputAudioRawFrame
    STT->>Turn: Transcription text
    Note over Turn: TranscriptionUserTurnStartStrategy + TurnAnalyzerUserTurnStopStrategy
    Turn->>Pivot: Aggregated user turn
    Pivot->>Pivot: Check for topic pivot
    Pivot->>LLM: Forward to LLM
    LLM->>Naturalizer: Response text streamed
    Naturalizer->>Naturalizer: Clean and humanize text
    Naturalizer->>TTS: Cleaned text
    TTS->>Transport: Synthesized audio frames
    Transport->>Serializer: Serialize
    Serializer->>WS: Binary PCM + JSON messages
    WS->>Agent: Binary frames + control JSON
    Agent->>Agent: Decode and queue audio
    Agent->>Speaker: Play PCM audio`
        },
        {
            id: 'pipeline-internals',
            title: '3. Pipecat Pipeline Internals',
            badge: 'Pipeline',
            code: `graph LR
    subgraph Input["Input Stage"]
        TI["transport.input()"]
    end
    subgraph STTStage["Speech-to-Text"]
        STT["SarvamSTTService"]
    end
    subgraph TurnMgmt["Turn Management"]
        UA["user_aggregator"]
    end
    subgraph Intelligence["Intelligence"]
        PD["PivotDetectorProcessor"]
        LLM["CerebrasLLMService"]
        NP["ResponseNaturalizerProcessor"]
    end
    subgraph TTSStage["Text-to-Speech"]
        TTS["SarvamTTSService"]
    end
    subgraph Output["Output Stage"]
        RTVI["RTVI Processor"]
        AA["assistant_aggregator"]
        TO["transport.output()"]
    end
    TI --> STT --> UA --> PD --> LLM --> NP --> TTS --> RTVI --> AA --> TO
    style Input fill:#e8f5e9,stroke:#2e7d32,color:#1b5e20
    style STTStage fill:#e3f2fd,stroke:#1565c0,color:#0d47a1
    style TurnMgmt fill:#fff3e0,stroke:#e65100,color:#bf360c
    style Intelligence fill:#f3e5f5,stroke:#6a1b9a,color:#4a148c
    style TTSStage fill:#fce4ec,stroke:#c62828,color:#b71c1c
    style Output fill:#fff9c4,stroke:#f9a825,color:#f57f17`
        },
        {
            id: 'turn-control',
            title: '4. Turn Control Strategy',
            badge: 'State Machine',
            code: `stateDiagram-v2
    [*] --> Idle
    Idle --> ListeningForTurnStart: Audio frames arriving
    ListeningForTurnStart --> UserSpeaking: Speech onset detected
    UserSpeaking --> AnalyzingTurnEnd: Transcription chunks received
    AnalyzingTurnEnd --> UserSpeaking: Not yet a complete turn
    AnalyzingTurnEnd --> TurnComplete: Turn end confirmed
    TurnComplete --> PivotCheck: Aggregated text sent downstream
    PivotCheck --> LLMProcessing: Normal flow
    PivotCheck --> InterruptAndResteer: Topic pivot detected
    InterruptAndResteer --> LLMProcessing: Re-steered prompt
    LLMProcessing --> TTSPlayback: Response generated
    TTSPlayback --> Idle: Audio playback complete`
        },
        {
            id: 'client-architecture',
            title: '5. Client Architecture',
            badge: 'Browser',
            code: `graph TB
    subgraph UI["UI Layer - index.html"]
        ConnBtn["Connect / Disconnect Button"]
        StatusBar["Status Indicator"]
        LangSel["Language Selector\\nhi-IN or en-IN"]
    end
    subgraph VoiceAgent["VoiceAgent - agent.js"]
        WSMgr["WebSocket Manager"]
        MicMgr["Microphone Manager"]
        WorkletBridge["Worklet Bridge"]
        PCMConv["Float32 to PCM16 Converter"]
        PlaybackQ["Audio Playback Queue"]
        HealthChk["Mic Health Check"]
        RTVIDec["RTVI Message Decoder"]
    end
    subgraph AudioWorklet["AudioWorklet - audio-processor.js"]
        Capture["Stream Float32 mic frames"]
    end
    subgraph WebAudio["Web Audio API"]
        AudioCtx["AudioContext"]
        MicStream["MediaStream"]
    end
    ConnBtn -->|"click"| WSMgr
    LangSel -->|"lang param"| WSMgr
    WSMgr <-->|"ws://host:8805/ws"| Server["FastAPI Server"]
    MicMgr -->|"getUserMedia"| MicStream
    MicStream --> AudioCtx
    AudioCtx --> WorkletBridge
    WorkletBridge <--> Capture
    Capture -->|"Float32 buffers"| PCMConv
    PCMConv -->|"PCM16 bytes"| WSMgr
    WSMgr -->|"binary frames"| PlaybackQ
    WSMgr -->|"JSON messages"| RTVIDec
    RTVIDec -->|"state updates"| StatusBar
    PlaybackQ -->|"decoded audio"| AudioCtx
    HealthChk -.->|"monitors"| MicStream
    style UI fill:#fff3e0,stroke:#e65100,color:#bf360c
    style VoiceAgent fill:#e3f2fd,stroke:#1565c0,color:#0d47a1
    style AudioWorklet fill:#fff9c4,stroke:#f9a825,color:#f57f17
    style WebAudio fill:#fce4ec,stroke:#c62828,color:#b71c1c`
        },
        {
            id: 'deployment-topology',
            title: '6. Deployment Topology',
            badge: 'Infrastructure',
            code: `graph TB
    subgraph UserMachine["User Machine"]
        Browser["Web Browser\\nhttp://localhost:3000"]
    end
    subgraph DevServer["Development Server"]
        subgraph ClientServer["Client Server"]
            HTTP["python -m http.server 3000\\nServes static files from client/"]
        end
        subgraph BackendServer["Backend Server"]
            Uvicorn["uvicorn main:app\\n--host 0.0.0.0 --port 8805\\n--app-dir ../server"]
            UVEnv["uv run\\nvoice-agent/pyproject.toml"]
        end
        DotEnv[".env\\nAPI Keys and Config"]
    end
    subgraph CloudServices["Cloud Services"]
        Sarvam["Sarvam AI\\nSTT + TTS"]
        Cerebras["Cerebras\\nLLM"]
    end
    Browser -->|"HTTP GET\\nport 3000"| HTTP
    Browser <-->|"WebSocket\\nws://localhost:8805/ws"| Uvicorn
    UVEnv -.->|"manages runtime"| Uvicorn
    DotEnv -.->|"config.py loads"| Uvicorn
    Uvicorn -->|"HTTPS API"| Sarvam
    Uvicorn -->|"HTTPS API"| Cerebras
    style UserMachine fill:#e8eaf6,stroke:#283593,color:#1a237e
    style DevServer fill:#e0f2f1,stroke:#00695c,color:#004d40
    style CloudServices fill:#f3e5f5,stroke:#6a1b9a,color:#4a148c
    style ClientServer fill:#e8f5e9,stroke:#2e7d32,color:#1b5e20
    style BackendServer fill:#e3f2fd,stroke:#1565c0,color:#0d47a1`
        },
        {
            id: 'project-file-map',
            title: '7. Project File Map',
            badge: 'Structure',
            code: `graph TD
    subgraph Root["c:/voice-agent"]
        env[".env"]
        gitignore[".gitignore"]
        readme["README.md"]
        subgraph ClientDir["client/"]
            html["index.html"]
            agentjs["agent.js"]
            audioProc["audio-processor.js"]
        end
        subgraph ServerDir["server/"]
            config["config.py"]
            main["main.py"]
            pipelinepy["pipeline.py"]
            serializer["serializer.py\\nunused reference"]
            subgraph ProcDir["processors/"]
                naturalizer["naturalizer.py"]
                pivotDet["pivot_detector.py"]
            end
            subgraph SerDir["serializers/"]
                rawpcm["raw_pcm.py\\nactive"]
            end
        end
        subgraph VADir["voice-agent/"]
            pyproject["pyproject.toml"]
            uvlock["uv.lock"]
            pyver[".python-version"]
            vamain["main.py\\nplaceholder"]
        end
    end
    style Root fill:#e8eaf6,stroke:#283593,color:#1a237e
    style ClientDir fill:#fce4ec,stroke:#c62828,color:#b71c1c
    style ServerDir fill:#e3f2fd,stroke:#1565c0,color:#0d47a1
    style ProcDir fill:#f3e5f5,stroke:#6a1b9a,color:#4a148c
    style SerDir fill:#fff3e0,stroke:#e65100,color:#bf360c
    style VADir fill:#e8f5e9,stroke:#2e7d32,color:#1b5e20`
        }
    ];
    // Store rendered SVG strings for download
    window._renderedSVGs = {};
    const container = document.getElementById('diagrams-container');
    for (const d of diagrams) {
        const card = document.createElement('div');
        card.className = 'diagram-card';
        card.id = `card-${d.id}`;
        card.innerHTML = `
            <div class="card-header">
                <h2>${d.title}</h2>
                <span class="badge">${d.badge}</span>
            </div>
            <div class="card-body">
                <div class="mermaid" id="mermaid-${d.id}">${d.code}</div>
            </div>
            <div class="card-footer">
                <button class="btn" onclick="downloadSVG('${d.id}', '${d.id}')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    SVG
                </button>
                <button class="btn primary" onclick="downloadPNG('${d.id}', '${d.id}')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    PNG
                </button>
            </div>
        `;
        container.appendChild(card);
    }
    // Render all diagrams
    await mermaid.run({ querySelector: '.mermaid' });
    // Cache all rendered SVGs
    for (const d of diagrams) {
        const el = document.getElementById(`mermaid-${d.id}`);
        if (el) {
            window._renderedSVGs[d.id] = el.innerHTML;
        }
    }
    showToast(`${diagrams.length} diagrams rendered — ready to download!`);
</script>
<script>
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }
    function getSVGString(id) {
        return window._renderedSVGs?.[id] || '';
    }
    function downloadSVG(id, filename) {
        const svgStr = getSVGString(id);
        if (!svgStr) { showToast('Diagram not ready yet'); return; }
        const blob = new Blob([svgStr], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `voice-agent-${filename}.svg`;
        a.click();
        URL.revokeObjectURL(url);
        showToast(`Downloaded ${filename}.svg`);
    }
    function downloadPNG(id, filename) {
        const svgStr = getSVGString(id);
        if (!svgStr) { showToast('Diagram not ready yet'); return; }
        // Parse the SVG to get dimensions
        const parser = new DOMParser();
        const svgDoc = parser.parseFromString(svgStr, 'image/svg+xml');
        const svgEl = svgDoc.querySelector('svg');
        // Get natural size from viewBox or width/height attributes
        let width, height;
        const viewBox = svgEl.getAttribute('viewBox');
        if (viewBox) {
            const parts = viewBox.split(/[\s,]+/);
            width = parseFloat(parts[2]);
            height = parseFloat(parts[3]);
        }
        // Fallback to width/height attributes
        if (!width) width = parseFloat(svgEl.getAttribute('width')) || 1200;
        if (!height) height = parseFloat(svgEl.getAttribute('height')) || 800;
        // Scale up for high-res output (2x)
        const scale = 2;
        const canvasW = width * scale;
        const canvasH = height * scale;
        // Force explicit dimensions on SVG for rendering
        svgEl.setAttribute('width', width);
        svgEl.setAttribute('height', height);
        const fixedSVG = new XMLSerializer().serializeToString(svgEl);
        const canvas = document.createElement('canvas');
        canvas.width = canvasW;
        canvas.height = canvasH;
        const ctx = canvas.getContext('2d');
        // White background
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvasW, canvasH);
        const img = new Image();
        const svgBlob = new Blob([fixedSVG], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(svgBlob);
        img.onload = function() {
            ctx.drawImage(img, 0, 0, canvasW, canvasH);
            URL.revokeObjectURL(url);
            canvas.toBlob(function(blob) {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `voice-agent-${filename}.png`;
                a.click();
                URL.revokeObjectURL(a.href);
                showToast(`Downloaded ${filename}.png`);
            }, 'image/png');
        };
        img.onerror = function() {
            URL.revokeObjectURL(url);
            showToast('PNG export failed — try SVG instead');
        };
        img.src = url;
    }
    async function downloadAll() {
        const ids = [
            'high-level-system', 'end-to-end-flow', 'pipeline-internals',
            'turn-control', 'client-architecture', 'deployment-topology', 'project-file-map'
        ];
        for (let i = 0; i < ids.length; i++) {
            downloadPNG(ids[i], ids[i]);
            // Small delay between downloads so browser doesn't block them
            await new Promise(r => setTimeout(r, 400));
        }
        showToast(`Downloading all ${ids.length} diagrams...`);
    }
</script>
</body>
</html>
